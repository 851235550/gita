# 编译与测试 —— 三种触发方式：
# 1. 自动：任意 tag 推送时
# 2. 手动：workflow_dispatch，可选择 tag 或分支
# 3. 被调用：被 create-tag.yml 通过 workflow_call 调用

name: Build

on:
  # 自动触发：任意 tag 推送时
  push:
    tags:
      - 'v*'

  # 手动触发：可选择 tag 或分支
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag 或分支名（如 v1.0.0 或 master）'
        required: true
        default: 'master'
        type: string

  # 被 create-tag.yml 调用（打完 tag 后自动触发编译+发布）
  workflow_call:
    inputs:
      ref:
        description: '要构建的 tag 或分支'
        required: true
        type: string
      is_tag:
        description: '是否为 tag 触发（控制是否创建 Release）'
        required: false
        type: boolean
        default: false

jobs:
  # ------------------------------------------------------------------
  # 第一阶段：测试
  # ------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 优先级：workflow_call > workflow_dispatch > push
          ref: ${{ inputs.ref || github.event.inputs.ref || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run Tests
        run: make test

  # ------------------------------------------------------------------
  # 第二阶段：编译（依赖测试通过）
  # ------------------------------------------------------------------
  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - build-linux         # linux/amd64
          - build-mac-arm       # darwin/arm64 (Apple Silicon)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.inputs.ref || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build (${{ matrix.target }})
        run: make ${{ matrix.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gita-${{ matrix.target }}
          path: build/gita-*

  # ------------------------------------------------------------------
  # 第三阶段：发布 Release（仅 tag 触发时执行）
  # ------------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    # 仅在 tag 场景创建 Release：push tag 或 workflow_call 传了 is_tag=true。
    if: startsWith(github.ref, 'refs/tags/') || inputs.is_tag
    permissions:
      contents: write  # 创建 Release 需要写权限

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gita-build-*
          merge-multiple: true

      - name: List Artifacts
        run: |
          echo "📦 待上传的二进制文件："
          ls -lh artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          # Release title 和 tag 统一使用 ref（workflow_call 传入的 tag 名），
          # 回退到 github.ref_name（push tag 时自动为 tag 名）。
          tag_name: ${{ inputs.ref || github.ref_name }}
          name: ${{ inputs.ref || github.ref_name }}
          body: |
            > 此 Release 由 Gita CI 自动生成。

            ## 📥 下载

            - **Linux x86_64**: `gita-linux-amd64`
            - **macOS Apple Silicon**: `gita-darwin-arm64`

            ## 🔧 安装

            ```bash
            # Linux
            chmod +x gita-linux-amd64
            sudo mv gita-linux-amd64 /usr/local/bin/gita

            # macOS
            chmod +x gita-darwin-arm64
            sudo mv gita-darwin-arm64 /usr/local/bin/gita
            ```

            ## 📝 变更

            详见 [commit history](https://github.com/${{ github.repository }}/commits/${{ inputs.ref || github.ref_name }})。
          files: artifacts/*
          draft: false
          prerelease: false

  # ------------------------------------------------------------------
  # 汇总
  # ------------------------------------------------------------------
  summary:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🔨 Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | ${{ github.event.inputs.ref || github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifacts | gita-build-linux / gita-build-mac-arm |" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "| Release | ✅ 已发布到 ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Release | ⏭ 跳过（非 tag 触发） |" >> $GITHUB_STEP_SUMMARY
          fi
