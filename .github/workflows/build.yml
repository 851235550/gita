# 编译与测试 —— 基于 Tag 自动触发，也可手动选择 Tag 或分支触发。
# 编译前先跑全部测试，通过后编译 linux/amd64 和 darwin/arm64 两个平台。
#
# 触发方式：
# 1. 自动：任意 tag 推送时自动触发（配合 create-tag.yml 使用）
# 2. 手动：workflow_dispatch，可选择 tag 或分支

name: Build and Test

on:
  # 自动触发：任意 tag 推送时
  push:
    tags:
      - 'v*'

  # 手动触发：可选择 tag 或分支
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag 或分支名（如 v1.0.0 或 master）'
        required: true
        default: 'master'
        type: string

jobs:
  # ------------------------------------------------------------------
  # 第一阶段：测试
  # ------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 手动触发时使用指定的 ref；自动触发时使用当前 tag
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run Tests
        run: make test

  # ------------------------------------------------------------------
  # 第二阶段：编译（依赖测试通过）
  # ------------------------------------------------------------------
  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - build-linux         # linux/amd64
          - build-mac-arm       # darwin/arm64 (Apple Silicon)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build (${{ matrix.target }})
        run: make ${{ matrix.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gita-${{ matrix.target }}
          path: build/gita-*

  # ------------------------------------------------------------------
  # 第三阶段：发布 Release（仅 tag 触发时执行）
  # ------------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    # 仅在 tag 推送时创建 Release，手动触发（分支）时跳过。
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write  # 创建 Release 需要写权限

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gita-build-*
          merge-multiple: true

      - name: List Artifacts
        run: |
          echo "📦 待上传的二进制文件："
          ls -lh artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # 自动以 tag message 作为 Release 描述（若 tag 是 annotated）。
          body: |
            ## 变更

            详见 commit history。

            ## 下载

            | 文件 | 平台 |
            |------|------|
            | `gita-linux-amd64` | Linux x86_64 |
            | `gita-darwin-arm64` | macOS Apple Silicon (M1/M2/M3/M4) |
          files: artifacts/*
          draft: false
          prerelease: false

  # ------------------------------------------------------------------
  # 汇总
  # ------------------------------------------------------------------
  summary:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🔨 Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | ${{ github.event.inputs.ref || github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifacts | gita-build-linux / gita-build-mac-arm |" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "| Release | ✅ 已发布到 ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Release | ⏭ 跳过（非 tag 触发） |" >> $GITHUB_STEP_SUMMARY
          fi
